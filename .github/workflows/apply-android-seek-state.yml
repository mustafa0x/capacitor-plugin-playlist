name: Apply Android seek-state fix

on:
  push:
    branches:
      - fix/android-seek-state

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/android-seek-state
          fetch-depth: 0

      - name: Apply focused fix
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("android/src/main/java/org/dwbn/plugins/playlist/PlaylistPlugin.kt")
          source = path.read_text()
          old = """            val isPlaying: Boolean? =
                          audioPlayerImpl!!.playlistManager.playlistHandler?.currentMediaPlayer?.isPlaying
                      audioPlayerImpl!!.playlistManager.playlistHandler?.seek(seekPosition)
                      if (isPlaying === null || !isPlaying) {
                          audioPlayerImpl!!.playlistManager.playlistHandler?.pause(false)
                      }
          """
          new = """            audioPlayerImpl!!.playlistManager.playlistHandler?.seek(seekPosition)
          """
          if source.count(old) != 1:
              raise SystemExit("expected seek block not found exactly once")
          path.write_text(source.replace(old, new))
          PY

      - name: Commit focused change
        run: |
          git rm .github/workflows/apply-android-seek-state.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android/src/main/java/org/dwbn/plugins/playlist/PlaylistPlugin.kt
          git commit -m "fix(android): preserve playback state when seeking"
          git push origin HEAD:fix/android-seek-state
