name: Apply Android batch-add initial selection fix

on:
  push:
    branches:
      - fix/android-add-all-initial-selection

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/android-add-all-initial-selection
          fetch-depth: 0

      - name: Apply focused fix
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("android/src/main/java/org/dwbn/plugins/playlist/manager/PlaylistManager.kt")
          source = path.read_text()

          old_replace = """        clearItems()
                  addAllItems(items)
                  currentPosition = 0
          """
          new_replace = """        clearItems()
                  audioTracks.addAll(items.orEmpty())
                  this.items = audioTracks
                  currentPosition = 0
          """

          old_append = """    fun addItem(item: AudioTrack?) {
                  if (item == null) {
                      return
                  }
                  val countBefore = audioTracks.size;
                  audioTracks.add(item)
                  items = audioTracks
                  if (countBefore == 0) {
                      currentPosition = 0
                      beginPlayback(1, true)
                  }
                  if (this.playlistHandler != null) {
                      this.playlistHandler!!.updateMediaControls()
                  }
              }

              fun addAllItems(its: List<AudioTrack>?) {
                  val currentItem = currentItem // may be null
                  audioTracks.addAll(its.orEmpty())
                  items =
                      audioTracks // not *strictly* needed since they share the reference, but for good measure..
                  currentPosition = audioTracks.indexOf(currentItem)
              }
          """
          new_append = """    fun addItem(item: AudioTrack?) {
                  addAllItems(listOfNotNull(item))
              }

              fun addAllItems(its: List<AudioTrack>?) {
                  val addedItems = its.orEmpty()
                  if (addedItems.isEmpty()) {
                      return
                  }

                  val currentItem = currentItem
                  val wasEmpty = audioTracks.isEmpty()
                  audioTracks.addAll(addedItems)
                  items = audioTracks

                  if (wasEmpty) {
                      currentPosition = 0
                      beginPlayback(1, true)
                  } else {
                      currentPosition = audioTracks.indexOf(currentItem)
                  }

                  playlistHandler?.updateMediaControls()
              }
          """

          if source.count(old_replace) != 1:
              raise SystemExit("expected setAllItems block not found exactly once")
          if source.count(old_append) != 1:
              raise SystemExit("expected append block not found exactly once")

          path.write_text(source.replace(old_replace, new_replace).replace(old_append, new_append))
          PY

      - name: Commit focused change
        run: |
          git rm .github/workflows/apply-android-add-all-initial-selection.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android/src/main/java/org/dwbn/plugins/playlist/manager/PlaylistManager.kt
          git commit -m "fix(android): initialize batch-added playlists"
          git push origin HEAD:fix/android-add-all-initial-selection
